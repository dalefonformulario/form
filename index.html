        /* Estilos personalizados para notificaciones */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 50;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 17px;
            transition: visibility 0s, opacity 0.5s linear;
            opacity: 0;
        }
        .toast.show {
            visibility: visible;
            opacity: 1;
        }
        .toast.success { background-color: #10B981; }
        .toast.error { background-color: #EF4444; }
    </style>

        // ==========================================
        // 4. LÓGICA DE INICIO DE SESIÓN
        // ==========================================
        function checkAgenteSession() {
            const agenteGuardado = localStorage.getItem('dalefon_agente_actual');
            if (agenteGuardado) {
                iniciarSesion(agenteGuardado);
            } else {
                loginScreen.classList.remove('hidden');
                mainFormScreen.classList.add('hidden');
            }
        }

        function iniciarSesion(nombre) {
            localStorage.setItem('dalefon_agente_actual', nombre);
            agenteHidden.value = nombre;
            nombreAgenteHeader.textContent = nombre.split(' ')[0];
            loginScreen.classList.add('hidden');
            mainFormScreen.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        btnContinuar.addEventListener('click', () => {
            const seleccionado = agenteLogin.value;
            if (seleccionado) {
                iniciarSesion(seleccionado);
            } else {
                showToast("Por favor, selecciona tu nombre antes de continuar", "error");
            }
        });

        btnCambiarAgente.addEventListener('click', () => {
            if(confirm("¿Seguro que deseas cambiar de agente?")) {
                localStorage.removeItem('dalefon_agente_actual');
                agenteHidden.value = '';
                agenteLogin.value = '';
                loginScreen.classList.remove('hidden');
                mainFormScreen.classList.add('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

            if (omvSeleccionado) {
                // Activar Categoría
                selectCategoria.disabled = false;
                selectCategoria.classList.remove('bg-slate-100');
                selectCategoria.classList.add('bg-white');

                // Elegir el mapa de datos correcto según el OMV
                const currentMap = (omvSeleccionado === 'Bait') ? dataMapBait : dataMapGeneral;
                
                Object.keys(currentMap).forEach(categoria => {
                    let option = document.createElement('option');
                    option.value = categoria;
                    option.textContent = categoria;
                    selectCategoria.appendChild(option);
                });
            } else {
                // Si regresa a opción vacía, deshabilitar Categoría
                selectCategoria.disabled = true;
                selectCategoria.classList.add('bg-slate-100');
                selectCategoria.classList.remove('bg-white');
                selectCategoria.innerHTML = '<option value="">Primero selecciona el OMV...</option>';
            }
        });

        // Evento cuando cambia la Categoría
        selectCategoria.addEventListener('change', function() {
            const categoriaSeleccionada = this.value;
            const omvSeleccionado = selectOMV.value;
            const currentMap = (omvSeleccionado === 'Bait') ? dataMapBait : dataMapGeneral;
            
            // Limpiar subtemas y acciones
            selectSubtema.innerHTML = '<option value="">Selecciona un subtema...</option>';
            selectAcciones.innerHTML = '<option value="">Selecciona una acción...</option>';
            
            if (categoriaSeleccionada && currentMap[categoriaSeleccionada]) {
                // Habilitar campos y cambiar estilo
                selectSubtema.disabled = false;
                selectSubtema.classList.remove('bg-slate-100');
                selectSubtema.classList.add('bg-white');
                
                selectAcciones.disabled = false;
                selectAcciones.classList.remove('bg-slate-100');
                selectAcciones.classList.add('bg-white');

                // Ocultar campo Otro por si estaba visible
                containerOtroAccion.classList.add('hidden');
                inputOtroAccion.required = false;
                inputOtroAccion.value = '';

                // Llenar subtemas
                currentMap[categoriaSeleccionada].subtemas.forEach(sub => {
                    let opt = document.createElement('option');
                    opt.value = sub;
                    opt.textContent = sub;
                    selectSubtema.appendChild(opt);
                });

                // Llenar acciones
                currentMap[categoriaSeleccionada].acciones.forEach(acc => {
                    let opt = document.createElement('option');
                    opt.value = acc;
                    opt.textContent = acc;
                    selectAcciones.appendChild(opt);
                });
            } else {
                // Deshabilitar si se regresa a opción vacía
                selectSubtema.disabled = true;
                selectSubtema.classList.add('bg-slate-100');
                selectSubtema.classList.remove('bg-white');
                
                selectAcciones.disabled = true;
                selectAcciones.classList.add('bg-slate-100');
                selectAcciones.classList.remove('bg-white');
            }
        });

        // Evento cuando cambia la Acción (para detectar "Otro")
        selectAcciones.addEventListener('change', function() {
            if (this.value === 'Otro') {
                containerOtroAccion.classList.remove('hidden');
                inputOtroAccion.required = true;
            } else {
                containerOtroAccion.classList.add('hidden');
                inputOtroAccion.required = false;
                inputOtroAccion.value = '';
            }
        });

        // ==========================================
        // 6. LÓGICA DE ENVÍO DE DATOS
        // ==========================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Advertencia si no se ha configurado el script
            if(GOOGLE_SCRIPT_URL.includes('TU_ID_DE_SCRIPT')) {
                showToast("Por favor, configura tu GOOGLE_SCRIPT_URL en el código HTML primero.", "error");
                return;
            }

            // Cambiar estado del botón
            const textOriginal = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Guardando...';
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-70');

            // Recopilar los datos del formulario
            const formData = new FormData(form);
            
            // Añadir fecha y hora actual automáticamente
            const fechaActual = new Date().toLocaleString('es-MX');
            formData.append('fecha_hora', fechaActual);

            // Si se seleccionó "Otro", actualizar el valor de "acciones" antes de enviar
            const accionSeleccionada = formData.get('acciones');
            if (accionSeleccionada === 'Otro') {
                const textoOtro = formData.get('acciones_otro');
                formData.set('acciones', 'Otro: ' + textoOtro);
            }

            try {
                // Enviar datos usando fetch.
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                showToast("✅ Asistencia registrada exitosamente", "success");
                form.reset();
                
                // IMPORTANTE: Al hacer reset, el input oculto también se borra. Hay que volverlo a llenar.
                agenteHidden.value = localStorage.getItem('dalefon_agente_actual');
                
                // Hacer scroll hacia arriba suavemente
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                // Reiniciar selects dependientes
                selectCategoria.disabled = true;
                selectCategoria.innerHTML = '<option value="">Primero selecciona el OMV...</option>';
                selectCategoria.classList.add('bg-slate-100');
                selectCategoria.classList.remove('bg-white');

                selectSubtema.disabled = true;
                selectSubtema.innerHTML = '<option value="">Primero selecciona una categoría...</option>';
                selectSubtema.classList.add('bg-slate-100');
                
                selectAcciones.disabled = true;
                selectAcciones.innerHTML = '<option value="">Primero selecciona una categoría...</option>';
                selectAcciones.classList.add('bg-slate-100');

                // Reiniciar campo Otro
                containerOtroAccion.classList.add('hidden');
                inputOtroAccion.required = false;
                inputOtroAccion.value = '';

            } catch (error) {
                console.error('Error:', error);
                showToast("❌ Error al guardar. Revisa tu conexión.", "error");
            } finally {
                // Restaurar botón
                btnSubmit.innerHTML = textOriginal;
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-70');
            }
        });

        // Función auxiliar para mostrar notificaciones flotantes (Toasts)
        function showToast(message, type = 'success') {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            setTimeout(function(){ 
                toast.className = toast.className.replace("show", ""); 
            }, 3000);
        }

        // ==========================================
        // 7. INICIALIZACIÓN
        // ==========================================
        // Al cargar la página, verificar si ya hay sesión iniciada
        checkAgenteSession();

    </script>
</body>
</html>
